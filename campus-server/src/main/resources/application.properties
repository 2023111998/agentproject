server.port=8000
spring.datasource.url=jdbc:mysql://mysql:3306/campus?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=campus123
spring.web.resources.static-locations=classpath:/static/

# ---- SOA: 服务发现配置 ----
order.service.url=http://order-service:8001
product.service.url=http://product-service:8002
logistics.service.url=http://logistics-service:8003

# ---- SOA: Resilience4j 断路器配置 ----
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3

# ---- SOA: Resilience4j 重试配置 ----
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=500ms

# ---- SOA: Resilience4j 超时配置 ----
resilience4j.timelimiter.configs.default.timeoutDuration=5s

# ---- SOA: Feign 客户端配置 ----
spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.circuitbreaker.enabled=true

# ---- Actuator: 暴露健康/指标/Prometheus 端点 ----
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ---- Logging ----
logging.level.com.campus=INFO
logging.level.com.campus.server.config.RequestLoggingFilter=INFO
logging.level.com.campus.server.client=DEBUG

# ---- Redis (可选 — 无 Redis 时自动回退到内存) ----
# spring.data.redis.host=redis
# spring.data.redis.port=6379

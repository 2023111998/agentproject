<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户端 - 校园外卖</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
</head><body>

<div id="app">
  <!-- 顶部三端切换 -->
  <nav class="topnav">
    <span class="brand">🍱 校园外卖</span>
    <a href="/" class="active">🛒 用户端</a>
    <a href="/merchant">🏪 商家端</a>
    <a href="/rider">🛵 骑手端</a>
    <span class="spacer"></span>
    <span class="user"><span>{{ user.name }} | {{ user.address }}</span><div class="avatar">张</div></span>
  </nav>

  <div class="layout">
    <!-- 用户端侧边栏 -->
    <aside class="sidebar">
      <div class="section">点餐</div>
      <a href="#" :class="{active:page==='order'}" @click.prevent="page='order'"><span class="icon">🛒</span>点餐下单</a>
      <a href="#" :class="{active:page==='myorders'}" @click.prevent="page='myorders'"><span class="icon">📦</span>我的订单</a>
      <div class="section" style="margin-top:12px">服务</div>
      <a href="#" :class="{active:page==='assistant'}" @click.prevent="page='assistant'"><span class="icon">🤖</span>智能助理</a>
    </aside>

    <div class="main">
      <!-- ========== 点餐 ========== -->
      <template v-if="page==='order'">
        <div class="panel">
          <div class="panel-header">🏪 选择商家</div>
          <div class="store-cards">
            <div class="store-card" :class="{active:selectedStore==='m001'}" @click="selectStore('m001')">
              <div class="emoji">🍜</div><h3>学生食堂</h3><div class="sub">⭐4.8 · 外卖快餐</div>
            </div>
            <div class="store-card" :class="{active:selectedStore==='m002'}" @click="selectStore('m002')">
              <div class="emoji">💻</div><h3>校园商业街数码店</h3><div class="sub">⭐4.6 · 数码3C</div>
            </div>
          </div>
        </div>

        <template v-if="selectedStore">
          <div class="panel">
            <div class="panel-header">📋 {{ storeName }} — 菜单</div>
            <div class="product-grid">
              <div class="product-card" v-for="p in storeProducts" :key="p.id" @click="addToCart(p)">
                <div class="emoji">{{ emoji(p.name) }}</div>
                <h4>{{ p.name }}</h4>
                <div class="price">¥{{ p.price.toFixed(2) }}</div>
                <div class="meta"><span>⭐{{ p.rating }}</span><span>库存{{ p.stock }}</span></div>
              </div>
            </div>
          </div>
        </template>
        <div v-else class="panel"><div class="empty-state"><div class="icon">👆</div><p>请先选择商家</p></div></div>

        <!-- 购物车 -->
        <div v-if="cart.length" class="panel">
          <div class="panel-header">🛒 购物车</div>
          <div class="cart-item" v-for="(c,i) in cart" :key="i">
            <span>{{ c.name }}</span>
            <div class="qty">
              <button @click="c.qty>1?c.qty--:cart.splice(i,1)">−</button>
              <span>{{ c.qty }}</span>
              <button @click="c.qty++">+</button>
            </div>
            <span style="color:var(--danger);font-weight:600">¥{{ (c.price*c.qty).toFixed(2) }}</span>
          </div>
          <div class="cart-bar">
            <span style="font-size:13px;color:var(--text-muted)">{{ cart.length }}种 · {{ cart.reduce((s,c)=>s+c.qty,0) }}件</span>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="total">¥{{ cartTotal.toFixed(2) }}</span>
              <button class="btn btn-primary btn-lg" @click="placeOrder">提交订单</button>
            </div>
          </div>
        </div>
      </template>

      <!-- ========== 我的订单 ========== -->
      <template v-if="page==='myorders'">
        <div class="panel">
          <div class="panel-header">📦 我的订单</div>
          <div class="tabs">
            <button :class="{active:orderFilter==='all'}" @click="orderFilter='all'">全部</button>
            <button :class="{active:orderFilter==='配送中'}" @click="orderFilter='配送中'">配送中</button>
            <button :class="{active:orderFilter==='已送达'}" @click="orderFilter='已送达'">已完成</button>
          </div>
          <div v-if="!filteredOrders.length" class="empty-state"><div class="icon">📭</div><p>暂无订单</p></div>
          <div class="order-card" v-for="o in filteredOrders" :key="o.id">
            <div class="head"><span class="oid">#{{ o.id }}</span><span><span v-html="statusBadge(o.status)"></span> <span class="badge badge-primary">{{ o.type }}</span></span></div>
            <div class="items">{{ parseItems(o.items).join('、') }} · ¥{{ o.amount.toFixed(2) }}</div>
            <div class="progress-steps" v-if="o.status!=='已发货'">
              <span :class="'step '+(o.status!=='已下单'?'done':'current')">📋已下单</span><span class="arrow">→</span>
              <span :class="'step '+(o.status==='配送中'?'current':o.status==='已送达'?'done':'')">🛵配送中</span><span class="arrow">→</span>
              <span :class="'step '+(o.status==='已送达'?'done':'')">✅已送达</span>
            </div>
            <div class="foot"><span>🏪{{ o.store_id }}</span><span>📍{{ o.address }}</span><span>🛵{{ o.rider_id||'待分配' }}</span><span>{{ o.created_at||'' }}</span></div>
          </div>
        </div>
      </template>

      <!-- ========== 智能助理 ========== -->
      <div v-if="page==='assistant'" style="display:flex;gap:16px;height:calc(100vh - 140px)">
        <!-- 左：对话 -->
        <div class="panel" style="flex:1;display:flex;flex-direction:column;padding:0;overflow:hidden">
          <div class="chat-header" style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px"><span class="dot"></span>🤖 智能助理</div>
          <div class="chat-body" ref="chatBody" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#f8fafc">
            <div v-for="(m,i) in chatMsgs" :key="i" :class="'chat-msg '+m.who">
              <div class="avatar">{{ m.who==='user'?'张':'🤖' }}</div>
              <div class="bubble" style="white-space:pre-wrap">{{ m.text }}</div>
            </div>
          </div>
          <div style="padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px">
            <button class="btn btn-outline btn-sm" @click="quickAsk('帮我点一份黄焖鸡米饭送到三号宿舍楼')">🛒 快速下单</button>
            <button class="btn btn-outline btn-sm" @click="quickAsk('查物流20260601001的配送路线')">🗺️ 物流地图</button>
            <button class="btn btn-outline btn-sm" @click="quickAsk('订单20260601001超时有补偿吗?')">📋 售后处理</button>
            <button class="btn btn-outline btn-sm" @click="quickAsk('耳机能退货吗?')">🔍 退货政策</button>
          </div>
          <div class="chat-input-row">
            <input v-model="chatInput" placeholder="输入问题..." @keydown.enter="chatSend">
            <button class="btn btn-primary" @click="chatSend">发送</button>
          </div>
        </div>
        <!-- 右：执行轨迹 + 地图 -->
        <div class="panel" style="flex:0 0 360px;display:flex;flex-direction:column;overflow-y:auto">
          <div class="panel-header">🔎 执行轨迹</div>
          <div style="display:flex;gap:8px;margin-bottom:12px;font-size:12px">
            <span style="background:#eef2ff;color:var(--primary);padding:2px 10px;border-radius:10px">意图: {{ chatIntent||'-' }}</span>
            <span style="background:#f1f5f9;color:var(--text-muted);padding:2px 10px;border-radius:10px">耗时: {{ chatLat||'-' }}</span>
          </div>
          <div v-if="chatTrace" style="flex:1;background:#f4faf6;border-radius:10px;padding:12px;font-family:Consolas,Menlo,monospace;font-size:11px;line-height:1.7;color:#1c3a26;white-space:pre-wrap;overflow-y:auto;margin-bottom:12px">{{ chatTrace }}</div>
          <div v-else style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px">发送消息后这里会显示<br>Agent 执行过程</div>
          <div class="map-container" id="mapContainer" style="margin-top:0"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="app.js"></script>
<script>
const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;
const { api, toast, statusBadge, emoji, renderMap } = App;

createApp({
  setup() {
    const user = { id:'u001', name:'张三', address:'三号宿舍楼' };
    const page = ref('order');
    const selectedStore = ref('');
    const products = ref([]);
    const cart = reactive([]);
    const orders = ref([]);
    const orderFilter = ref('all');
    const chatMsgs = reactive([]), chatInput = ref(''), chatIntent = ref(''), chatLat = ref(''), chatTrace = ref('');
    const chatBody = ref(null);
    let chatInited = false;

    const storeName = computed(() => selectedStore.value==='m001'?'学生食堂':'校园商业街数码店');
    const storeProducts = computed(() => products.value.filter(p=>p.store_id===selectedStore.value));
    const cartTotal = computed(() => cart.reduce((s,c)=>s+c.price*c.qty,0));
    const filteredOrders = computed(() => orderFilter.value==='all'?orders.value:orders.value.filter(o=>o.status===orderFilter.value));

    function parseItems(i) { try{return JSON.parse(i||'[]')}catch{return[i]} }

    async function loadData() {
      const [prods, ords] = await Promise.all([api.getProducts(), api.getOrders(user.id)]);
      products.value = prods; orders.value = ords;
    }

    function selectStore(sid) { selectedStore.value = sid; cart.length = 0; }
    function addToCart(p) {
      if (cart.length && cart[0].store_id !== p.store_id) { if (!confirm('切换商家将清空购物车，确定？')) return; cart.length = 0; }
      const ex = cart.find(c=>c.name===p.name); ex ? ex.qty++ : cart.push({ name:p.name, price:p.price, store_id:p.store_id, qty:1 });
    }
    async function placeOrder() {
      if (!cart.length) return toast('购物车为空', false);
      const items = cart.flatMap(c=>Array(c.qty).fill(c.name));
      const r = await api.createOrder({ order_id:'ORD'+Date.now(), user_id:user.id, store_id:cart[0].store_id, items, amount:cartTotal.value, type:'外卖', address:user.address });
      if (r.error) { toast(r.error, false); return; }
      if (r.id) { toast('下单成功！'); cart.length = 0; loadData(); } else toast('下单失败', false);
    }

    function addChat(t, w) { chatMsgs.push({text:t,who:w}); nextTick(()=>{const el=chatBody.value;if(el)el.scrollTop=el.scrollHeight;}); }
    function initChat() {
      if (chatInited) return; chatInited = true;
      addChat('你好！我是智能服务助理 🤖','bot');
      addChat('可以帮你：\n🗺️ 查物流配送路线（带地图）\n📋 处理售后与退款（BPMN流程）\n🔍 查商品与政策（RAG检索）\n🛡️ 安全护栏保护','bot');
    }
    async function chatSend() {
      initChat();
      const t = chatInput.value.trim(); if (!t) return; chatInput.value = ''; addChat(t, 'user');
      chatIntent.value = '...'; chatTrace.value = '';
      const d = await api.chat(t, user.id); addChat(d.reply||'(无)', 'bot');
      chatIntent.value = d.intent||'-'; chatLat.value = (d.latency!=null?d.latency+'s':'-'); chatTrace.value = d.trace||'';
      if (d.map_data) renderMap('mapContainer', d.map_data);
      // 智能助理下单/售后操作后自动刷新订单列表
      if (d.intent === '下单' || d.intent === '售后') { loadData(); }
    }
    function quickAsk(q) { chatInput.value = q; chatSend(); }

    // 切换到助理页时初始化
    const { watch } = Vue;
    watch(page, v => { if (v==='assistant') nextTick(initChat); });

    onMounted(loadData);
    return { user, page, selectedStore, products, cart, orders, orderFilter, chatMsgs, chatInput, chatIntent, chatLat, chatTrace, chatBody,
             storeName, storeProducts, cartTotal, filteredOrders, selectStore, addToCart, placeOrder, chatSend, quickAsk, parseItems, statusBadge, emoji };
  }
}).mount('#app');
</script>
</body></html>

# ============================================================================
# Docker Compose 监控扩展 — Prometheus + Grafana
# 用法: docker compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up -d
# ============================================================================
services:

  # ===== Prometheus 指标采集 =====
  prometheus:
    image: prom/prometheus:latest
    container_name: campus-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - campus-net

  # ===== Grafana 可视化 =====
  grafana:
    image: grafana/grafana:latest
    container_name: campus-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=campus123
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - campus-net
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  campus-net:
    external: true
    name: campus-assistant-java_campus-net

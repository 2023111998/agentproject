# ============================================================================
# Prometheus 配置 — 校园电商/外卖智能服务平台 (Java 版)
# 启动: docker compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up -d
# ============================================================================
global:
  scrape_interval: 15s       # 每 15 秒采集一次指标
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── 告警规则 (可选, 需 Alertmanager) ──────────────────────────────────────────
rule_files:
  # - /etc/prometheus/rules/*.yml

# ── 采集目标 ─────────────────────────────────────────────────────────────────
scrape_configs:

  # 1. 主应用 (Spring Boot Actuator + Micrometer Prometheus)
  - job_name: 'campus-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'campus-server-1:8000'
          - 'campus-server-2:8000'
        labels:
          service: 'campus-server'
          env: 'production'

  # 2. Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# ============================================================================
# Nginx 负载均衡 — 校园电商/外卖智能服务平台
# 前端静态文件由 campus-server 提供，Nginx 做反向代理 + 负载均衡
# ============================================================================

upstream campus_backend {
    # 主应用 (可扩展多实例，配合 docker-compose scale)
    server campus-server-1:8000 weight=3 max_fails=3 fail_timeout=30s;
    server campus-server-2:8000 weight=3 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream order_backend {
    server order-service:8001 max_fails=3 fail_timeout=30s;
}

upstream product_backend {
    server product-service:8002 max_fails=3 fail_timeout=30s;
}

upstream logistics_backend {
    server logistics-service:8003 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;
    charset utf-8;

    # 客户端上传限制
    client_max_body_size 10m;
    client_body_timeout 30s;

    # Gzip 压缩
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 512;

    # ====== 前端页面 (用户端/商家端/骑手端) ======
    location / {
        proxy_pass http://campus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ====== 智能助理 API ======
    location /api/chat {
        proxy_pass http://campus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;          # Agent 推理可能较慢
        proxy_buffering off;
    }

    # ====== 通用 API ======
    location /api/ {
        proxy_pass http://campus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ====== 微服务直连 (内部调用) ======
    location /orders/ {
        internal;                         # 仅内部访问，不对外暴露
        proxy_pass http://order_backend;
    }

    location /products/ {
        internal;
        proxy_pass http://product_backend;
    }

    location /track/ {
        internal;
        proxy_pass http://logistics_backend;
    }

    location /route/ {
        internal;
        proxy_pass http://logistics_backend;
    }

    # ====== 健康检查 ======
    location /health {
        access_log off;
        return 200 "OK";
    }
}

# ====== 微服务间内部调用 ======
# 各服务通过 Docker 网络内的服务名互访，Nginx 在此处主要做主应用的负载均衡
